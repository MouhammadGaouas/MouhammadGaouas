name: "Generate GitHub Metrics"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # كل يوم

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
