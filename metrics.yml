name: "Metrics"
on:
  schedule:
    - cron: "0 * * * *" # تعمل كل ساعة (يمكن تغييره)
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Build Metrics
        uses: lowlighter/metrics@latest
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repos: "user1/repo1,user2/repo2" # ضع هنا المستودعات التي تريد إحصاءاتها
